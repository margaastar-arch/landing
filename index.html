<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор освобождения времени</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Montserrat+Alternates:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060d28;
      --cyan: #00c8f0;
      --lime: #a8dc4a;
      --text-dim: #7a9ec0;
      --text-dim2: #c8dca8;
      --btn-grad: linear-gradient(135deg, #8fcc20 0%, #00b8e0 100%);
      --max-w: 580px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
    }
    .state { display: none; }
    .state.active {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      animation: fadeIn 400ms ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    /* === HERO === */
    .hero-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 1;
      padding: 48px 24px;
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .hero-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--lime);
      margin-bottom: 24px;
    }
    .hero-title {
      font-family: 'Montserrat Alternates', sans-serif;
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 16px;
      color: var(--text-dim);
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .btn-cta-hero {
      background: var(--btn-grad);
      color: #0a1a04;
      border: none;
      border-radius: 12px;
      padding: 16px 40px;
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }
    .btn-cta-hero:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,200,240,0.25);
    }
    /* === QUIZ === */
    .quiz-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      padding: 48px 24px 40px;
      max-width: var(--max-w);
      margin: 0 auto;
      width: 100%;
    }
    .progress-dots {
      display: flex;
      gap: 8px;
      margin-bottom: 48px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 300ms ease, transform 300ms ease;
    }
    .dot.active { background: var(--cyan); transform: scale(1.3); }
    .dot.done   { background: var(--lime); }
    .question-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      transition: transform 280ms ease, opacity 280ms ease;
    }
    .question-wrap.slide-out { transform: translateX(-48px); opacity: 0; pointer-events: none; }
    .question-wrap.slide-in  { transform: translateX(48px);  opacity: 0; }
    .question-text {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
    }
    .hint {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: -20px;
      margin-bottom: 16px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .opt-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 20px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }
    .opt-btn:hover  { background: rgba(0,200,240,0.08); border-color: rgba(0,200,240,0.3); }
    .opt-btn.selected { background: rgba(168,220,74,0.12); border-color: var(--lime); color: var(--lime); }
    .btn-next {
      margin-top: 24px;
      background: var(--btn-grad);
      color: #0a1a04;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-start;
      transition: opacity 200ms ease;
    }
    .btn-next:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <div id="state-hero" class="state active">
    <div class="hero-wrap">
      <div class="hero-label">Калькулятор освобождения времени</div>
      <h1 class="hero-title">Сколько часов ты<br>теряешь каждую неделю?</h1>
      <p class="hero-sub">2 минуты — и ты узнаешь точную цифру</p>
      <button class="btn-cta-hero" onclick="startQuiz()">Узнать →</button>
    </div>
  </div>
  <div id="state-quiz" class="state">
    <div class="quiz-wrap">
      <div class="progress-dots" id="progress-dots"></div>
      <div class="question-wrap" id="question-wrap"></div>
    </div>
  </div>
  <div id="state-result" class="state"></div>
  <script>
    function transitionTo(id) {
      document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function startQuiz() {
      transitionTo('state-quiz');
    }
  </script>
</body>
</html>
